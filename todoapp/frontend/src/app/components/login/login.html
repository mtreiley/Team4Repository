<section aria-labelledby="login-heading">
  <h1 id="login-heading">Login</h1>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div>
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" formControlName="username" />
    </div>

    <div>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" formControlName="password" />
    </div>

    <button type="submit">Login</button>
  </form>

  @if (errorMessage()) {
    <p role="alert" class="error-message">{{ errorMessage() }}</p>
  }

  <p>Don't have an account? <a routerLink="/register">Register here</a></p>
</section>
